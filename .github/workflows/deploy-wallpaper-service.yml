name: Build Paper Nexus

on:
  push:
    branches: ['main']
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Publish
      shell: pwsh
      run: |
        $tag = '${{ github.ref_name }}'
        $runNumber = '${{ github.run_number }}'
        $version = if ($tag -match '^v') { $tag.TrimStart('v') } else { "1.0.$runNumber" }
        dotnet publish PaperNexus/PaperNexus.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:PublishTrimmed=false `
          -p:Version=$version `
          --output ./publish/PaperNexus

    - name: Sign executable (self-signed)
      if: env.SIGNING_CERTIFICATE != ''
      env:
        SIGNING_CERTIFICATE: ${{ secrets.SIGNING_CERTIFICATE }}
        SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
      shell: pwsh
      run: |
        # Decode the persistent PFX from the GitHub secret
        $pfxBytes = [Convert]::FromBase64String($env:SIGNING_CERTIFICATE)
        $pfxPath = "$env:TEMP\papernexus-sign.pfx"
        [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)

        # Locate signtool from the Windows SDK
        $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "signtool.exe" -Recurse |
          Where-Object { $_.FullName -match 'x64' } |
          Sort-Object FullName -Descending |
          Select-Object -First 1 -ExpandProperty FullName

        # Sign with SHA-256 digest and a public timestamp authority
        & $signtool sign /f $pfxPath /p $env:SIGNING_CERTIFICATE_PASSWORD /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /v ./publish/PaperNexus/PaperNexus.exe
        if ($LASTEXITCODE -ne 0) { throw "signtool exited with code $LASTEXITCODE" }

        Remove-Item $pfxPath -Force

    - name: Create GitHub Release
      shell: pwsh
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        $isTag = '${{ github.ref }}' -match '^refs/tags/'
        $runNumber = '${{ github.run_number }}'
        $releaseTag = if ($isTag) { '${{ github.ref_name }}' } else { "v1.0.$runNumber" }
        $releaseTitle = if ($isTag) { "Paper Nexus ${{ github.ref_name }}" } else { "Paper Nexus v1.0.$runNumber" }
        $notes = if ($isTag) { '--generate-notes' } else { '--notes "Automated build from main."' }
        Invoke-Expression "gh release create '$releaseTag' --title '$releaseTitle' $notes ./publish/PaperNexus/PaperNexus.exe"
