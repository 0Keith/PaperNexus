name: Build Paper Nexus

on:
  push:
    branches: ['main']
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Publish
      shell: pwsh
      run: |
        $tag = '${{ github.ref_name }}'
        $runNumber = '${{ github.run_number }}'
        $version = if ($tag -match '^v') { $tag.TrimStart('v') } else { "1.0.$runNumber" }
        dotnet publish PaperNexus/PaperNexus.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:PublishTrimmed=false `
          -p:Version=$version `
          --output ./publish/PaperNexus

    - name: Sign executable (self-signed)
      env:
        SIGNING_CERTIFICATE: ${{ secrets.SIGNING_CERTIFICATE }}
        SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        GH_TOKEN: ${{ secrets.GH_PAT }}
      shell: pwsh
      run: |
        $pfxPath = "$env:TEMP\papernexus-sign.pfx"
        $certPassword = $env:SIGNING_CERTIFICATE_PASSWORD
        $needsNewCert = $false

        if ($env:SIGNING_CERTIFICATE) {
          # Load the stored cert and check whether it is expired or expiring within 30 days
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIGNING_CERTIFICATE))
          $pfxPwd = ConvertTo-SecureString -String $certPassword -Force -AsPlainText
          $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($pfxPath, $pfxPwd)
          $daysUntilExpiry = ($cert.NotAfter - (Get-Date)).TotalDays
          $cert.Dispose()

          if ($daysUntilExpiry -le 30) {
            Write-Host "Certificate expires in $([math]::Floor($daysUntilExpiry)) day(s) — regenerating."
            $needsNewCert = $true
          } else {
            Write-Host "Certificate valid for $([math]::Floor($daysUntilExpiry)) more day(s) — reusing."
          }
        } else {
          # No cert stored yet — generate on first run
          $needsNewCert = $true
        }

        if ($needsNewCert) {
          $certPassword = [System.Guid]::NewGuid().ToString("N")
          $cert = New-SelfSignedCertificate `
            -Subject "CN=PaperNexus" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -Type CodeSigningCert `
            -HashAlgorithm SHA256 `
            -NotAfter (Get-Date).AddYears(5)
          $pfxPwd = ConvertTo-SecureString -String $certPassword -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $pfxPwd | Out-Null

          if ($env:GH_TOKEN) {
            $base64 = [Convert]::ToBase64String([IO.File]::ReadAllBytes($pfxPath))
            gh secret set SIGNING_CERTIFICATE --body $base64 --repo '${{ github.repository }}'
            gh secret set SIGNING_CERTIFICATE_PASSWORD --body $certPassword --repo '${{ github.repository }}'
            Write-Host "Signing certificate generated and stored as repository secrets."
          } else {
            Write-Warning "GH_PAT not set — cert is ephemeral for this run. Add a GH_PAT secret (secrets:write) to persist it."
          }
        }

        $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "signtool.exe" -Recurse |
          Where-Object { $_.FullName -match 'x64' } |
          Sort-Object FullName -Descending |
          Select-Object -First 1 -ExpandProperty FullName

        & $signtool sign /f $pfxPath /p $certPassword /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /v ./publish/PaperNexus/PaperNexus.exe
        if ($LASTEXITCODE -ne 0) { throw "signtool exited with code $LASTEXITCODE" }

        Remove-Item $pfxPath -Force

    - name: Create GitHub Release
      shell: pwsh
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        $isTag = '${{ github.ref }}' -match '^refs/tags/'
        $runNumber = '${{ github.run_number }}'
        $releaseTag = if ($isTag) { '${{ github.ref_name }}' } else { "v1.0.$runNumber" }
        $releaseTitle = if ($isTag) { "Paper Nexus ${{ github.ref_name }}" } else { "Paper Nexus v1.0.$runNumber" }
        $notes = if ($isTag) { '--generate-notes' } else { '--notes "Automated build from main."' }
        Invoke-Expression "gh release create '$releaseTag' --title '$releaseTitle' $notes ./publish/PaperNexus/PaperNexus.exe"
