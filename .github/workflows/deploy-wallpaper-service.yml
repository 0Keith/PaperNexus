name: Build Paper Nexus

on:
  push:
    branches: ['main']
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write  # Required for SignPath OIDC connector

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Publish
      shell: pwsh
      run: |
        $tag = '${{ github.ref_name }}'
        $runNumber = '${{ github.run_number }}'
        $version = if ($tag -match '^v') { $tag.TrimStart('v') } else { "1.0.$runNumber" }
        dotnet publish PaperNexus/PaperNexus.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:PublishTrimmed=false `
          -p:Version=$version `
          --output ./publish/PaperNexus

    - name: Upload unsigned artifact for signing
      uses: actions/upload-artifact@v4
      with:
        name: unsigned-PaperNexus
        path: ./publish/PaperNexus/PaperNexus.exe

    - name: Sign with SignPath Foundation
      uses: signpath/github-action-submit-signing-request@v1
      with:
        api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
        organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
        signing-policy-slug: release-signing
        artifact-configuration-slug: papernexus-exe
        github-artifact-name: unsigned-PaperNexus
        output-artifact-directory: ./publish/PaperNexus-signed
        wait-for-completion: true

    - name: Replace unsigned exe with signed
      shell: pwsh
      run: |
        Copy-Item ./publish/PaperNexus-signed/PaperNexus.exe ./publish/PaperNexus/PaperNexus.exe -Force

    - name: Create GitHub Release
      shell: pwsh
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        $isTag = '${{ github.ref }}' -match '^refs/tags/'
        $runNumber = '${{ github.run_number }}'
        $releaseTag = if ($isTag) { '${{ github.ref_name }}' } else { "v1.0.$runNumber" }
        $releaseTitle = if ($isTag) { "Paper Nexus ${{ github.ref_name }}" } else { "Paper Nexus v1.0.$runNumber" }
        $notes = if ($isTag) { '--generate-notes' } else { '--notes "Automated build from main."' }
        Invoke-Expression "gh release create '$releaseTag' --title '$releaseTitle' $notes ./publish/PaperNexus/PaperNexus.exe"
